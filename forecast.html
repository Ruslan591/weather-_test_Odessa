<script>
// --- Вспомогательные функции ---
// Текущий выбор дней прогноза
let forecastDays = localStorage.getItem("forecastDays") || 1;
document.getElementById("forecastDays").innerText = forecastDays + (forecastDays > 1 ? " дня" : " день");

// Переключение видимости меню
function toggleForecastMenu(){
    const menu = document.getElementById("forecastMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

// Выбор количества дней
function setForecastDays(days, e){
    e.stopPropagation(); // чтобы клик по пункту меню не закрыл меню через document
    forecastDays = days;
    localStorage.setItem("forecastDays", days);
    document.getElementById("forecastDays").innerText = days + (days > 1 ? " дня" : " день");
    document.getElementById("forecastMenu").style.display = "none"; // скрыть меню
    load(); // перезагрузить прогноз с новым количеством дней
}

// Скрываем меню при клике вне кнопки/меню
document.addEventListener("click", (e) => {
    const menu = document.getElementById("forecastMenu");
    const button = document.querySelector(".forecast-button");
    if (!button.contains(e.target)) {
        menu.style.display = "none";
    }
});



// --- переменная модели
function modelLabel(model){
    switch(model){
        case "ecmwf_ifs": return "ECMWF IFS";
        case "icon_eu": return "ICON EU";
        case "ukmo_global_deterministic_10km": return "UKMO Global";
        case "meteofrance_arpege_europe": return "ARPEGE Europe";
        case "jma_gsm": return "JMA GSM";
        case "gfs_global": return "GFS Global";
        default: return "ECMWF IFS";
    }
}

let weatherModel = localStorage.getItem("weatherModel") || "ecmwf_ifs04";
document.getElementById("modelName").innerText = modelLabel(weatherModel);

function toggleModelMenu() {
    const menu = document.getElementById("modelMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function setModel(model, e) {
    e.stopPropagation();
    weatherModel = model;
    localStorage.setItem("weatherModel", model);
    document.getElementById("modelName").innerText = modelLabel(model);
    document.getElementById("modelMenu").style.display = "none";
    load();
}

// скрываем меню при клике вне кнопки/меню
document.addEventListener("click", (e) => {
    const menu = document.getElementById("modelMenu");
    const button = document.querySelector(".model-button");
    if (!button.contains(e.target)) {
        menu.style.display = "none";
    }
});

// заглушка функции load()
function load(){ console.log("Загружена модель:", weatherModel); }
// --- включает или выключает CSS-класс active у родительского элемента --- 
function toggle(el){el.parentElement.classList.toggle("active")}
// --- преобразует градусы ветра в направление --- 
function windDir(d){
    const dirs=["С","ССВ","СВ","ВСВ","В","ВЮВ","ЮВ","ЮЮВ","Ю","ЮЮЗ","ЮЗ","ЗЮЗ","З","ЗСЗ","СЗ","ССЗ"];
    return dirs[Math.round(d/22.5)%16];
}
// --- функция сглаживания линии графика
function smooth(points){
    if(!points.length) return "";
    let d=`M ${points[0].x} ${points[0].y}`;
    for(let i=1;i<points.length-1;i++){
        const xc=(points[i].x+points[i+1].x)/2;
        const yc=(points[i].y+points[i+1].y)/2;
        d+=` Q ${points[i].x} ${points[i].y} ${xc} ${yc}`;
    }
    const last=points[points.length-1];
    d+=` T ${last.x} ${last.y}`;
    return d;
}
// --- график
function createGraph(dataSlice, timesSlice, color, hoursToShow = 24, graphId = 0){    
  const nowTime = Date.now();
    if(dataSlice.length === 0) return `<svg width="100%" height="90"></svg>`;

    const w = 320, h = 90;
    const step = w / Math.max(dataSlice.length - 1, 1);
    const min = Math.min(...dataSlice);
    const max = Math.max(...dataSlice);
    const norm = v => h - 10 - (v - min) / (max - min || 1) * (h - 20);

    let pts = [], labels = "", nowLine = "";

    // Линии в 0:00
    let dayLines = "";
    timesSlice.forEach((tRaw, i)=>{
    const t = new Date(tRaw);

    const x = i * step;
    const y = norm(dataSlice[i]);
    pts.push({x, y});

   // if(t.getTime() <= nowTime && nowTime < t.getTime() + 3600000)
      //  nowLine = `<line x1="${x}" y1="0" x2="${x}" y2="${h}" stroke="#ffffff55" stroke-dasharray="4 4"/>`;

    const hr = t.getHours();

    if(hr === 0)
        dayLines += `<line x1="${x}" y1="0" x2="${x}" y2="${h}" stroke="#666" stroke-dasharray="2 4"/>`;

    if(hr % 3 === 0)
        labels += `<text x="${x}" y="${h-2}" font-size="9" text-anchor="middle" fill="#888">${hr}</text>`;
});

// --- точная линия текущего времени ---
const startTime = new Date(timesSlice[0]).getTime();
const endTime = new Date(timesSlice[timesSlice.length - 1]).getTime();

if(nowTime >= startTime && nowTime <= endTime){
    const ratio = (nowTime - startTime) / (endTime - startTime);
    const xNow = ratio * w;

    nowLine = `<line x1="${xNow}" y1="0" x2="${xNow}" y2="${h}" stroke="#ffffff55" stroke-width="1.5"/>`;
}

    // Линия между первой и последней точкой
    const baseY0 = pts[0].y;
    const baseY1 = pts[pts.length-1].y;

    // Путь для области между графиком и виртуальной линией
    let areaPath = "M" + pts.map((p,i) => `${p.x},${p.y}`).join(" L");
    areaPath += ` L${pts[pts.length-1].x},${baseY1} L${pts[0].x},${baseY0} Z`;

    // Уникальный id градиента
    const gradientId = `areaGradient${graphId}`;
    const gradient = `
    <defs>
      <linearGradient id="${gradientId}" x1="0" y1="${Math.min(...pts.map(p=>p.y), baseY0, baseY1)}"
                                     x2="0" y2="${Math.max(...pts.map(p=>p.y), baseY0, baseY1)}"
                                     gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    `;

    return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">
        ${gradient}
        ${dayLines}
        ${nowLine}
        <path d="${areaPath}" fill="url(#${gradientId})" stroke="none"/>
        <path d="${smooth(pts)}" fill="none" stroke="${color}" stroke-width="2.5"/>
        ${labels}
    </svg>`;
}
;

function createStatsTable(dataSlice, unit, title){
    if(!dataSlice || dataSlice.length === 0) return "";

    const start = dataSlice[0];
    const end = dataSlice[dataSlice.length-1];
    const min = Math.min(...dataSlice);
    const max = Math.max(...dataSlice);
    const delta = end - start;
    const velocity = delta / (dataSlice.length - 1 || 1);
    const forecast = end + velocity * 3;

    // Цвета для роста/падения
    const trendColor = delta > 0 ? "#ff4444" : "#4fc3f7";
    const forecastColor = forecast > end ? "#ff4444" : "#4fc3f7";

    return `
    <div class="stats-table" style="
        display:grid; 
        grid-template-columns: repeat(3, 1fr); 
        gap:6px; 
        background: linear-gradient(135deg, #222 0%, #111 100%); 
        padding:10px; 
        border-radius:8px;
        color:#eee;
        font-family:sans-serif;
        font-size:12px;
    ">
        <div style="text-align:center;">
            Start<br><b>${start.toFixed(1)}${unit}</b>
        </div>
        <div style="text-align:center;">
            End<br><b style="color:${trendColor}">${end.toFixed(1)}${unit}</b>
        </div>
        <div style="text-align:center;">
            Δ24h<br><b style="color:${trendColor}">${delta.toFixed(1)}${unit}</b>
        </div>
        <div style="text-align:center;">
            Min<br><b>${min.toFixed(1)}${unit}</b>
        </div>
        <div style="text-align:center;">
            Max<br><b>${max.toFixed(1)}${unit}</b>
        </div>
        <div style="text-align:center;">
            Forecast +3h<br><b style="color:${forecastColor}">${forecast.toFixed(1)}${unit}</b>
        </div>
        <div style="grid-column:span 3; text-align:center; margin-top:4px; font-weight:bold; color:#ddd;">
            ${title}
        </div>
    </div>
    `;
}




// --- Основная функция ---
async function load(){
    const API= `https://api.open-meteo.com/v1/forecast?latitude=46.43&longitude=30.74&hourly=temperature_2m,apparent_temperature,pressure_msl,relative_humidity_2m,weather_code,visibility,wind_speed_10m,wind_gusts_10m,wind_direction_10m,precipitation,showers,snowfall,snow_depth,shortwave_radiation,direct_radiation,diffuse_radiation,dew_point_2m,runoff,cloud_cover,cloud_cover_low,cloud_cover_mid,cloud_cover_high&models=${weatherModel}&timezone=auto&forecast_days=${forecastDays}&wind_speed_unit=ms`;
    const r=await fetch(API);
    const data=await r.json();
    const h=data.hourly;
    const hours=h.time.map((t,i)=>({
        time:t,
        temperature_2m:h.temperature_2m[i],
        apparent_temperature:h.apparent_temperature[i],
        pressure_msl:h.pressure_msl[i],
        relative_humidity_2m:h.relative_humidity_2m[i],
        weather_code:h.weather_code[i],
        visibility:h.visibility[i],
        wind_speed_10m:h.wind_speed_10m[i],
        wind_gusts_10m:h.wind_gusts_10m[i],
        wind_direction_10m:h.wind_direction_10m[i],
        rain:h.precipitation[i]||0,
        showers:h.showers[i]||0,
        snowfall:h.snowfall[i],
        snow_depth:h.snow_depth[i],
        shortwave_radiation:h.shortwave_radiation[i],
        direct_radiation:h.direct_radiation[i],
        diffuse_radiation:h.diffuse_radiation[i],
        dew_point_2m:h.dew_point_2m[i],
        runoff:h.runoff[i],
        cloud_cover:h.cloud_cover[i],
        cloud_cover_low:h.cloud_cover_low[i],
        cloud_cover_mid:h.cloud_cover_mid[i],
        cloud_cover_high:h.cloud_cover_high[i]
    }));

// ----- 2️⃣ Финальный renderGraphs -----
function renderGraphs(hours, h) {
    const container = document.getElementById("graphs");
    if(!hours || !h.time || hours.length === 0 || h.time.length === 0){
        container.innerHTML = "<p>Данные ещё не загружены.</p>";
        return;
    }
    container.innerHTML = "";

    const graphs = [
        {data: hours.map(x=>x.temperature_2m), color:"#ff8f00", unit:"°", title:"Температура"},
        {data: hours.map(x=>x.pressure_msl/1), color:"#4aa3ff", unit:"гПа", title:"Давление"},
        {data: hours.map(x=>x.relative_humidity_2m), color:"#00bcd4", unit:"%", title:"Влажность"},
        {data: hours.map(x=>x.wind_speed_10m), color:"#8bc34a", unit:"м/с", title:"Скорость ветра"},
        {data: hours.map(x=>x.rain), color:"#448aff", unit:"мм/ч", title:"Осадки"},
    ];

    const hoursToShow = 24 * (forecastDays-1);
    const nowTime = new Date().getTime();
    const timesDates = h.time.map(t => new Date(t));

    function getSlice(data){
    let startIndex = timesDates.findIndex(t => t.getTime() >= nowTime);
    if(startIndex === -1) startIndex = 0;

    startIndex = Math.max(0, startIndex - 1);

    let endIndex = Math.min(startIndex + hoursToShow, data.length);
    return {
        data: data.slice(startIndex, endIndex),
        time: h.time.slice(startIndex, endIndex)
    };
}

    graphs.forEach((g, i) => {
        const slice = getSlice(g.data);

const graphHTML = createGraph(
    slice.data,
    slice.time,
    g.color,
    hoursToShow,
    i+1
);

const statsHTML = createStatsTable(
    slice.data,
    g.unit,
    g.title
);
        const wrapper = document.createElement("div");
        wrapper.style.display = "flex";
        wrapper.style.flexDirection = "column";
        wrapper.style.gap = "4px";
        wrapper.innerHTML = graphHTML + statsHTML;

        container.appendChild(wrapper);
    });
}

    // --- Графики с таблицами ---
 //   document.getElementById("graphs").innerHTML =
   //     createGraph(hours.map(x=>x.temperature_2m), h.time, "#ff8f00", 24, 1) + createStatsTable(hours.map(x=>x.temperature_2m),"°","Температура") +
    //    createGraph(hours.map(x=>x.pressure_msl/1), h.time, "#4aa3ff", 24, 2) + createStatsTable(hours.map(x=>x.pressure_msl/1), "гПа","Давление") +
     //   createGraph(hours.map(x=>x.relative_humidity_2m), h.time, "#00bcd4",24, 3) + createStatsTable(hours.map(x=>x.relative_humidity_2m), "%","Влажность") +
    //    createGraph(hours.map(x=>x.wind_speed_10m), h.time, "#8bc34a", 24, 4) + createStatsTable(hours.map(x=>x.wind_speed_10m), "м/с","Скорость ветра") +
   //     createGraph(hours.map(x=>x.rain), h.time, "#448aff", 24, 5) + createStatsTable(hours.map(x=>x.rain), "мм/ч","Осадки");
        
     // ----- 3️⃣ Вызов функции после загрузки данных -----
if(hours && h && h.time) {
    renderGraphs(hours, h);
}   

// расшифровка погоды
function weatherCode(code, hour, cloud=0){
    const night = (hour >= 21 || hour < 6);

    const icon = {
        clear: night ? "🌙" : "☀️",
        few: night ? "🌙☁️" : "🌤️",
        scattered: "⛅",
        broken: "☁️",
        fog: "🌫️",

        drizzleLight:"🌦️",
        drizzle:"🌦️",
        drizzleHeavy:"🌧️",

        rainLight:"🌦️",
        rain:"🌧️",
        rainHeavy:"🌧️🌧️",
        freezingRainLight:"🌧️❄️",
        freezingRainHeavy:"🌧️❄️❄️",

        snowLight:"🌨️",
        snow:"❄️",
        snowHeavy:"❄️❄️",
        snowGrains:"🌨️❄️",

        showersLight:"🌦️",
        showersModerate:"🌧️",
        showersHeavy:"🌧️🌧️",

        storm:"⛈️"
    };

    let text="";
    let ico="";

    switch(code){
        case 0: // ясно
        case 1: // небольшая облачность
        case 2: // переменная облачность
        case 3: // пасмурно
            if(cloud < 10){text="Ясно"; ico=icon.clear;}
            else if(cloud < 30){text="Небольшая облачность"; ico=icon.few;}
            else if(cloud < 60){text="Переменная облачность"; ico=icon.scattered;}
            else{text="Облачно"; ico=icon.broken;}
            break;

        // туман
        case 45: case 48: text="Туман"; ico=icon.fog; break;

        // морось
        case 51: text="Слабая морось"; ico=icon.drizzleLight; break;
        case 53: text="Морось"; ico=icon.drizzle; break;
        case 55: text="Сильная морось"; ico=icon.drizzleHeavy; break;

        // дождь
        case 61: text="Лёгкий дождь"; ico=icon.rainLight; break;
        case 63: text="Дождь"; ico=icon.rain; break;
        case 65: text="Сильный дождь"; ico=icon.rainHeavy; break;

        // замерзающий дождь
        case 66: text="Лёгкий замерзающий дождь"; ico=icon.freezingRainLight; break;
        case 67: text="Сильный замерзающий дождь"; ico=icon.freezingRainHeavy; break;

        // снег
        case 71: text="Лёгкий снег"; ico=icon.snowLight; break;
        case 73: text="Снег"; ico=icon.snow; break;
        case 75: text="Сильный снег"; ico=icon.snowHeavy; break;
        case 77: text="Снежные крупинки"; ico=icon.snowGrains; break;

        // ливни
        case 80: text="Ливни слабые"; ico=icon.showersLight; break;
        case 81: text="Ливни умеренные"; ico=icon.showersModerate; break;
        case 82: text="Ливни сильные"; ico=icon.showersHeavy; break;

        // снежные ливни
        case 85: text="Слабый снежный ливень"; ico=icon.snowLight; break;
        case 86: text="Сильный снежный ливень"; ico=icon.snowHeavy; break;

        // грозы
        case 95: text="Гроза"; ico=icon.storm; break;
        case 96: text="Гроза с дождём слабая"; ico=icon.storm; break;
        case 99: text="Гроза с дождём сильная"; ico=icon.storm; break;

        default: text="Неизвестно"; ico="❓"; break;
    }

    return {text, icon: ico};
}

function comfortLevel(h){
    const temp = h.apparent_temperature;
    const wind = h.wind_speed_10m;
    const humidity = h.relative_humidity_2m;
    const rain = h.rain + h.showers;
    const snow = h.snowfall;
    const sun = h.shortwave_radiation;
    const cloud = h.cloud_cover;
    const storm = (h.weather_code >= 95); // гроза

    let comfort = "Комфортно";
    let color = "#43A047";

    // --- базовая температура ---
    if(temp < -5) { comfort = "Очень холодно"; color="#1976D2"; }
    else if(temp < 0) { comfort = "Холодно"; color="#4FC3F7"; }
    else if(temp < 10) { comfort = wind>5 ? "Пронизывающий ветер" : "Прохладно"; color="#81D4FA"; }
    else if(temp < 18) { comfort = wind>7 ? "Ветрено" : "Немного прохладно"; color="#AED581"; }
    else if(temp < 26) { comfort = "Комфортно"; color="#43A047"; }
    else if(temp < 32) { comfort = sun>500 ? "Жарко на солнце" : "Тепло"; color="#FFB300"; }
    else { comfort = "Жарко"; color="#E53935"; }

    // --- осадки и снег ---
    if(rain > 0) { comfort += " с дождём"; color="#448AFF"; }
    if(snow > 0) { comfort += " со снегом"; color="#90CAF9"; }

    // --- высокая влажность ---
    if(humidity > 80 && temp>20) { comfort += " и душно"; color="#FF7043"; }

    // --- облачность снижает солнечный дискомфорт ---
    if(sun>400 && cloud>70) { comfort += " (облачно, солнце скрыто)"; }

    // --- гроза / сильные явления ---
    if(storm) { comfort += " ⚡ Гроза!"; color="#D32F2F"; }

    // --- можно добавить дополнительные параметры, если нужно ---
    // например CAPE, CIN, UV и т.д.

    return {comfort, color};
}

    // --- Почасовой прогноз ---
    const now=new Date().getHours();
    const next24=hours.slice(now, now+24*(forecastDays-1));
    const days=["Вс","Пн","Вт","Ср","Чт","Пт","Сб"];
    let html="";
    next24.forEach((h,i)=>{
        const d=new Date(h.time);
        
        const w = weatherCode(
    h.weather_code,
    d.getHours(),
    h.cloud_cover,
    h.rain,
    h.snowfall
);

        if(i===0 || days[d.getDay()]!==days[new Date(next24[i-1].time).getDay()]){
            html+=`<div class="day-header">${days[d.getDay()]}, ${d.getDate()}</div>`;
        }
        let {comfort, color:c} = comfortLevel(h);        html+=`

        <div class="row">
            <div class="indicator-line" style="background:${c}"></div>
            <div class="summary" onclick="toggle(this)">
                <div style="width:15%">${d.getHours()}:00</div>
                <div style="width:20%;font-size:1.9em;text-align:center">${w.icon}</div>
                <div style="width:25%;text-align:center;font-weight:bold;color:${h.temperature_2m>0?"#FF8F00":"#00E5FF"}">${h.temperature_2m.toFixed(1)}°</div>
                <div style="width:15%">💨${Math.round(h.wind_speed_10m)}</div>
                <div style="width:15%;text-align:right">☔${Math.round(h.rain+h.showers)}</div>
            </div>
            <div class="details">
                <div class="status-line" style="color:${c}">${w.text} • ${comfort}</div>
                <div class="grid-container">
                    <div><span class="label">Ощущается</span><div class="val">${h.apparent_temperature.toFixed(1)}°</div></div>
                    <div><span class="label">Влажность</span><div class="val">${h.relative_humidity_2m}%</div></div>
                    <div><span class="label">Ветер</span><div class="val">${windDir(h.wind_direction_10m)} ${Math.round(h.wind_speed_10m)} м/с</div></div>
                    <div><span class="label">Порывы</span><div class="val">${Math.round(h.wind_gusts_10m)} м/с</div></div>
                    <div><span class="label">Давление</span><div class="val">${(h.pressure_msl/1).toFixed(1)} гПа</div></div>
                    <div><span class="label">Видимость</span><div class="val">${(h.visibility/1000).toFixed(0)} км</div></div>
                    <div><span class="label">Облачность</span><div class="val">${h.cloud_cover}%</div></div>
                    <div><span class="label">Слои L/M/H</span><div class="val">${h.cloud_cover_low}/${h.cloud_cover_mid}/${h.cloud_cover_high}</div></div>
                    <div><span class="label">Снег</span><div class="val">${h.snowfall} мм</div></div>
                    <div><span class="label">Покров</span><div class="val">${h.snow_depth} см</div></div>
                </div>
            </div>
        </div>`;
    });
    document.getElementById("forecast").innerHTML=html;
}

load();
</script>
</div>
</body>
</html>
