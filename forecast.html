<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="forecast.css">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>

<!-- =========================
     ВЕРХНЯЯ ПАНЕЛЬ
========================= -->
<div class="header">
    <div class="nav">
        <a href="index.html">ГМЦ ЧАМ</a>
        <a href="pws.html">PWS</a>
    </div>
    <div class="headerTitle">Прогноз</div>
    <div class="nav">
        <a href="verify.html">Рейтинг</a>
    </div>
</div>
<div class="main-title">
  <!-- Кнопка выбора срока прогноза -->
<span class="forecast-button" onclick="toggleForecastMenu(event)">
  <span id="forecastDays">1 день</span> ▼
  <div id="forecastMenu" class="forecast-menu" style="display:none;">
    <div onclick="setForecastDays(2, event)">2 дня</div>
    <div onclick="setForecastDays(3, event)">3 дня</div>
    <div onclick="setForecastDays(5, event)">5 дней</div>
    <div onclick="setForecastDays(7, event)">7 дней</div>
    <div onclick="setForecastDays(10, event)">10 дней</div>
    <div onclick="setForecastDays(16, event)">16 дней</div>
  </div>
</span>
   
  <span class="model-button" onclick="toggleModelMenu()">
    <span id="modelName">ECMWF</span> ▼
    <div id="modelMenu" class="model-menu">
      <div onclick="setModel('ecmwf_ifs', event)">ECMWF IFS HRES</div>
      <div onclick="setModel('icon_eu', event)">ICON EU</div>
      <div onclick="setModel('ukmo_global_deterministic_10km', event)">UKMO Global</div>
      <div onclick="setModel('meteofrance_arpege_europe', event)">ARPEGE Europe</div>
      <div onclick="setModel('jma_gsm', event)">JMA GSM</div>
      <div onclick="setModel('gfs_global', event)">GFS Global</div>
    </div>
</span>
</div>
<div id="content">
 <!-- Контейнер для графиков и таблиц -->
  <div id="fcChart" style="max-width:340px; margin:0 auto; padding: 0 8px;">
    <div class="fc-param-row" id="fcParamRow"></div>
    <div id="fcChartWrap" style="background:#161616;border-radius:10px;overflow:hidden;padding:4px 0 0;"></div>
    <div id="fcStats" class="fc-stats" style="display:none;margin-top:4px;"></div>
</div>
   <!--  Контейнер для почасового прогноза -->
<div id="forecast"></div>

<script>
// --- Вспомогательные функции ---
// Текущий выбор дней прогноза
let forecastDays = parseInt(localStorage.getItem("forecastDays")) || 1;
document.getElementById("forecastDays").innerText = forecastDays + (forecastDays > 1 ? " дня" : " день");

// Переключение видимости меню
function toggleForecastMenu(e){
    e.stopPropagation();
    const menu = document.getElementById("forecastMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

// Выбор количества дней
function setForecastDays(days, e){
    e.stopPropagation(); // чтобы клик по пункту меню не закрыл меню через document
    forecastDays = days;
    localStorage.setItem("forecastDays", days);
    document.getElementById("forecastDays").innerText = days + (days > 1 ? " дня" : " день");
    document.getElementById("forecastMenu").style.display = "none"; // скрыть меню
    load(); // перезагрузить прогноз с новым количеством дней
}

// Скрываем меню при клике вне кнопки/меню
document.addEventListener("click", (e) => {
    const menu = document.getElementById("forecastMenu");
    const button = document.querySelector(".forecast-button");
    if (!button.contains(e.target)) {
        menu.style.display = "none";
    }
});



// --- переменная модели
function modelLabel(model){
    switch(model){
        case "ecmwf_ifs": return "ECMWF IFS";
        case "icon_eu": return "ICON EU";
        case "ukmo_global_deterministic_10km": return "UKMO Global";
        case "meteofrance_arpege_europe": return "ARPEGE Europe";
        case "jma_gsm": return "JMA GSM";
        case "gfs_global": return "GFS Global";
        default: return "ECMWF IFS";
    }
}

let weatherModel = localStorage.getItem("weatherModel") || "ecmwf_ifs04";
document.getElementById("modelName").innerText = modelLabel(weatherModel);

function toggleModelMenu() {
    const menu = document.getElementById("modelMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function setModel(model, e) {
    e.stopPropagation();
    weatherModel = model;
    localStorage.setItem("weatherModel", model);
    document.getElementById("modelName").innerText = modelLabel(model);
    document.getElementById("modelMenu").style.display = "none";
    load();
}

// скрываем меню при клике вне кнопки/меню
document.addEventListener("click", (e) => {
    const menu = document.getElementById("modelMenu");
    const button = document.querySelector(".model-button");
    if (!button.contains(e.target)) {
        menu.style.display = "none";
    }
});

// --- включает или выключает CSS-класс active у родительского элемента ---
function toggle(el){ el.parentElement.classList.toggle("active"); }

// --- преобразует градусы ветра в направление ---
function windDir(d){
    const dirs=["С","ССВ","СВ","ВСВ","В","ВЮВ","ЮВ","ЮЮВ","Ю","ЮЮЗ","ЮЗ","ЗЮЗ","З","ЗСЗ","СЗ","ССЗ"];
    return dirs[Math.round(d/22.5)%16];
}

// --- сглаживание линии ---
function smooth(points){
    if(!points.length) return "";
    let d = `M ${points[0].x} ${points[0].y}`;
    for(let i = 1; i < points.length - 1; i++){
        const xc = (points[i].x + points[i+1].x) / 2;
        const yc = (points[i].y + points[i+1].y) / 2;
        d += ` Q ${points[i].x} ${points[i].y} ${xc} ${yc}`;
    }
    const last = points[points.length - 1];
    d += ` T ${last.x} ${last.y}`;
    return d;
}

// --- параметры графика ---
const FC_PARAMS = [
    { key:"temp",     label:"Температура", color:"#ff8f00", unit:"°",    field: h => h.temperature_2m        },
    { key:"pressure", label:"Давление",    color:"#4aa3ff", unit:" гПа", field: h => h.pressure_msl          },
    { key:"humidity", label:"Влажность",   color:"#00bcd4", unit:"%",    field: h => h.relative_humidity_2m  },
    { key:"wind",     label:"Ветер",       color:"#8bc34a", unit:" м/с", field: h => h.wind_speed_10m        },
    { key:"winddir",  label:"Направление", color:"#74b9ff", unit:"°",    field: h => h.wind_direction_10m    },
    { key:"rain",     label:"Осадки",      color:"#448aff", unit:" мм",  field: h => h.rain                  },
];

let _fcParam = "temp";
let _fcHours = null;
let _fcTimes = null;

function buildFcParamRow(){
    const row = document.getElementById("fcParamRow");
    if(!row) return;
    row.innerHTML = FC_PARAMS.map(p => `
        <button class="fc-param-btn${p.key === _fcParam ? " active" : ""}"
                data-key="${p.key}"
                style="--c:${p.color}"
                onclick="fcSwitchParam('${p.key}')">
            ${p.label}
        </button>`
    ).join("");
}

function fcSwitchParam(key){
    _fcParam = key;
    document.querySelectorAll(".fc-param-btn").forEach(b =>
        b.classList.toggle("active", b.dataset.key === key)
    );
    if(_fcHours) renderForecastChart(_fcHours, _fcTimes);
}

function renderForecastChart(hours, times){
    if(_fcParam === "winddir") return renderForecastWindDir(hours, times);

    const wrap     = document.getElementById("fcChartWrap");
    const statsBox = document.getElementById("fcStats");
    if(!wrap) return;

    const cfg  = FC_PARAMS.find(p => p.key === _fcParam);
    const data = hours.map(h => cfg.field(h));

    const W = 320, H = 160;
    const pad = { t:14, r:10, b:28, l:38 };
    const iW  = W - pad.l - pad.r;
    const iH  = H - pad.t - pad.b;

    const vAll = data.filter(v => v != null && !isNaN(v));
    if(!vAll.length){ wrap.innerHTML = ""; return; }

    let vMin = Math.min(...vAll), vMax = Math.max(...vAll);
    const spread = vMax - vMin || 1;
    vMin -= spread * 0.3;
    vMax += spread * 0.3;

    const tMin = new Date(times[0]).getTime();
    const tMax = new Date(times[times.length - 1]).getTime();
    const px = t => pad.l + (new Date(t).getTime() - tMin) / (tMax - tMin) * iW;
    const py = v => pad.t + (1 - (v - vMin) / (vMax - vMin)) * iH;

    const pts = times.map((t, i) => ({ x: px(t), y: py(data[i] ?? vMin) }));
    const linePath = smooth(pts);

    const x0 = pts[0].x,            y0 = pts[0].y;
    const xN = pts[pts.length-1].x, yN = pts[pts.length-1].y;
    const areaPath = linePath + ` L${xN},${yN} L${x0},${y0} Z`;

    // Сетка Y
    let yGrid = "", yLabels = "";
    for(let i = 0; i <= 4; i++){
        const v = vMin + (vMax - vMin) * (1 - i / 4);
        const y = pad.t + iH * i / 4;
        yGrid   += `<line x1="${pad.l}" y1="${y}" x2="${pad.l+iW}" y2="${y}" stroke="#252525" stroke-width="1"/>`;
        yLabels += `<text x="${pad.l-4}" y="${y+4}" text-anchor="end" font-size="9" fill="#555">${v.toFixed(cfg.key==="pressure"?0:1)}</text>`;
    }

    // Сетка X + метки
    const DAY_NAMES = ["Вс","Пн","Вт","Ср","Чт","Пт","Сб"];
    let xGrid = "", xLabels = "";
    times.forEach(t => {
        const d  = new Date(t);
        const hr = d.getHours();
        const x  = px(t);
        if(hr === 0){
            xGrid += `<line x1="${x}" y1="${pad.t}" x2="${x}" y2="${pad.t+iH}" stroke="#444" stroke-dasharray="2 4"/>`;
            // Подпись дня: "Пн 14" — по центру между этой и следующей полночью
            const dayLabel = `${DAY_NAMES[d.getDay()]} ${d.getDate()}`;
            xLabels += `<text x="${x+2}" y="${pad.t+8}" text-anchor="start" font-size="8" fill="#444" font-weight="600">${dayLabel}</text>`;
        }
        if(hr % 6 === 0)
            xLabels += `<text x="${x}" y="${H-6}" text-anchor="middle" font-size="9" fill="#555">${hr}:00</text>`;
    });

    // Линия текущего времени
    let nowLine = "";
    const nowTs = Date.now();
    if(nowTs >= tMin && nowTs <= tMax){
        const xNow = pad.l + (nowTs - tMin) / (tMax - tMin) * iW;
        nowLine = `<line x1="${xNow}" y1="${pad.t}" x2="${xNow}" y2="${pad.t+iH}"
                         stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-dasharray="4 3"/>`;
    }

    const gradY0 = Math.min(y0, yN);
    const gradY1 = Math.max(y0, yN) + iH * 0.4;
    const gradId = "fcGrad_" + cfg.key;

    wrap.innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="display:block;">
        <defs>
            <linearGradient id="${gradId}" x1="0" y1="${gradY0}" x2="0" y2="${gradY1}"
                            gradientUnits="userSpaceOnUse">
                <stop offset="0%"   stop-color="${cfg.color}" stop-opacity="0.32"/>
                <stop offset="100%" stop-color="${cfg.color}" stop-opacity="0"/>
            </linearGradient>
        </defs>
        ${yGrid}${xGrid}${nowLine}
        <path d="${areaPath}" fill="url(#${gradId})" stroke="none"/>
        <line x1="${x0}" y1="${y0}" x2="${xN}" y2="${yN}"
              stroke="${cfg.color}" stroke-opacity="0.22" stroke-width="1.5" stroke-dasharray="4 3"/>
        <path d="${linePath}" fill="none" stroke="${cfg.color}" stroke-width="2.5"/>
        ${yLabels}${xLabels}
    </svg>`;

    // Статистика
    const start = vAll[0], end = vAll[vAll.length-1];
    const min = Math.min(...vAll), max = Math.max(...vAll);
    const delta = end - start;
    const avg = vAll.reduce((a,b)=>a+b,0) / vAll.length;
    const f = (v, dec=1) => v.toFixed(dec) + cfg.unit;

    const iMin = data.indexOf(min), iMax = data.indexOf(max);
    const tFmt = idx => {
        if(idx < 0 || !times[idx]) return "";
        const d = new Date(times[idx]);
        return isNaN(d) ? "" : d.toLocaleString("ru-RU",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
    };

    if(statsBox){
        statsBox.style.display = "grid";

        let card4 = "";

        if(cfg.key === "temp"){
            // 4я карточка: амплитуда
            const amplitude = max - min;
            card4 = `
            <div class="fc-stat-card">
                <div class="fc-stat-label">Амплитуда</div>
                <div class="fc-stat-value" style="color:#fdcb6e;">${amplitude.toFixed(1)}°</div>
                <div class="fc-stat-time">макс − мин</div>
            </div>`;

        } else if(cfg.key === "pressure"){
            // 4я карточка: тенденция
            const trendC = delta > 0 ? "#ff6b6b" : delta < 0 ? "#74b9ff" : "#888";
            const trendWord = delta > 0 ? "↑ рост" : delta < 0 ? "↓ падение" : "→ стабильно";
            card4 = `
            <div class="fc-stat-card">
                <div class="fc-stat-label">Тенденция</div>
                <div class="fc-stat-value" style="color:${trendC};">${delta>0?"+":""}${delta.toFixed(1)} гПа</div>
                <div class="fc-stat-time">${trendWord}</div>
            </div>`;

        } else if(cfg.key === "humidity"){
            // 4я карточка: часов с влажностью > 80%
            const highCount = data.filter(v => v != null && v > 80).length;
            const highPct   = Math.round(highCount / data.filter(v => v != null).length * 100);
            card4 = `
            <div class="fc-stat-card">
                <div class="fc-stat-label">Влажно (>80%)</div>
                <div class="fc-stat-value" style="color:#00bcd4;">${highCount} ч</div>
                <div class="fc-stat-time">${highPct}% времени</div>
            </div>`;

        } else if(cfg.key === "wind"){
            // 4я карточка: штиль / сильный ветер
            const calmCount  = data.filter(v => v != null && v < 1).length;
            const strongCount= data.filter(v => v != null && v >= 10).length;
            if(strongCount > 0){
                card4 = `
                <div class="fc-stat-card">
                    <div class="fc-stat-label">Сильный (≥10)</div>
                    <div class="fc-stat-value" style="color:#ff9f5c;">${strongCount} ч</div>
                    <div class="fc-stat-time">м/с и выше</div>
                </div>`;
            } else {
                card4 = `
                <div class="fc-stat-card">
                    <div class="fc-stat-label">Штиль (&lt;1 м/с)</div>
                    <div class="fc-stat-value" style="color:#74b9ff;">${calmCount} ч</div>
                    <div class="fc-stat-time">из ${data.filter(v=>v!=null).length} ч</div>
                </div>`;
            }

        } else if(cfg.key === "rain"){
            // Для осадков — полностью другие 4 карточки
            const rainHours = data.filter(v => v != null && v > 0).length;
            const totalHours= data.filter(v => v != null).length;
            const dryPct    = Math.round((totalHours - rainHours) / totalHours * 100);
            const total     = data.reduce((a,v) => a + (v ?? 0), 0);
            const iPeak     = data.indexOf(max);
            statsBox.style.display = "grid";
            statsBox.innerHTML = `
            <div class="fc-stat-card">
                <div class="fc-stat-label">Сумма</div>
                <div class="fc-stat-value" style="color:#448aff;">${total.toFixed(1)} мм</div>
                <div class="fc-stat-time">за период</div>
            </div>
            <div class="fc-stat-card">
                <div class="fc-stat-label">Часов с дождём</div>
                <div class="fc-stat-value" style="color:#448aff;">${rainHours} ч</div>
                <div class="fc-stat-time">из ${totalHours} ч</div>
            </div>
            <div class="fc-stat-card">
                <div class="fc-stat-label">Пик</div>
                <div class="fc-stat-value" style="color:#74b9ff;">${max.toFixed(1)} мм/ч</div>
                <div class="fc-stat-time">${tFmt(iPeak)}</div>
            </div>
            <div class="fc-stat-card">
                <div class="fc-stat-label">Без осадков</div>
                <div class="fc-stat-value" style="color:#5fe08f;">${dryPct}%</div>
                <div class="fc-stat-time">времени</div>
            </div>`;
            return; // ранний выход — осадки рендерят свои 4 карточки полностью
        }

        statsBox.innerHTML = `
        <div class="fc-stat-card">
            <div class="fc-stat-label">Минимум</div>
            <div class="fc-stat-value" style="color:${cfg.color};">${f(min)}</div>
            <div class="fc-stat-time">${tFmt(iMin)}</div>
        </div>
        <div class="fc-stat-card">
            <div class="fc-stat-label">Максимум</div>
            <div class="fc-stat-value" style="color:${cfg.color};">${f(max)}</div>
            <div class="fc-stat-time">${tFmt(iMax)}</div>
        </div>
        <div class="fc-stat-card">
            <div class="fc-stat-label">Среднее</div>
            <div class="fc-stat-value" style="color:#ccc;">${f(avg)}</div>
            <div class="fc-stat-time">${vAll.length} значений</div>
        </div>
        ${card4}`;
    }

    // Тултип по наведению на SVG
    const svgEl = wrap.querySelector("svg");
    if(svgEl){
        svgEl.addEventListener("mousemove", e => {
            const rect = svgEl.getBoundingClientRect();
            const scaleX = W / rect.width;
            const mx = (e.clientX - rect.left) * scaleX;
            // Ищем ближайшую точку
            let best = 0, bestDist = Infinity;
            pts.forEach((p, i) => {
                const dist = Math.abs(p.x - mx);
                if(dist < bestDist){ bestDist = dist; best = i; }
            });
            fcShowTooltip(e, best, data, times, cfg);
        });
        svgEl.addEventListener("mouseleave", fcHideTooltip);
        svgEl.addEventListener("touchmove", e => {
            const touch = e.touches[0];
            const rect = svgEl.getBoundingClientRect();
            const scaleX = W / rect.width;
            const mx = (touch.clientX - rect.left) * scaleX;
            let best = 0, bestDist = Infinity;
            pts.forEach((p, i) => {
                const dist = Math.abs(p.x - mx);
                if(dist < bestDist){ bestDist = dist; best = i; }
            });
            fcShowTooltip(touch, best, data, times, cfg);
            e.preventDefault();
        }, { passive: false });
        svgEl.addEventListener("touchend", fcHideTooltip);
    }
}

// --- Wind Direction scatter chart ---
function renderForecastWindDir(hours, times){
    const wrap     = document.getElementById("fcChartWrap");
    const statsBox = document.getElementById("fcStats");
    if(!wrap) return;

    const cfg  = FC_PARAMS.find(p => p.key === "winddir");
    const data = hours.map(h => h.wind_direction_10m);
    const spds = hours.map(h => h.wind_speed_10m);

    const W = 320, H = 160;
    const pad = { t:14, r:10, b:28, l:34 };
    const iW  = W - pad.l - pad.r;
    const iH  = H - pad.t - pad.b;

    const tMin = new Date(times[0]).getTime();
    const tMax = new Date(times[times.length - 1]).getTime();
    const px = t => pad.l + (new Date(t).getTime() - tMin) / (tMax - tMin || 1) * iW;
    const py = v => pad.t + (1 - v / 360) * iH;

    // Сетка Y — румбы
    const yRumbs = [
        [0,"С"],[45,"СВ"],[90,"В"],[135,"ЮВ"],
        [180,"Ю"],[225,"ЮЗ"],[270,"З"],[315,"СЗ"],[360,"С"]
    ];
    let yGrid = "", yLabels = "";
    for(const [deg, lbl] of yRumbs){
        const y = py(deg);
        yGrid   += `<line x1="${pad.l}" y1="${y}" x2="${pad.l+iW}" y2="${y}" stroke="#252525" stroke-width="1"/>`;
        yLabels += `<text x="${pad.l-4}" y="${y+4}" text-anchor="end" font-size="9" fill="#555">${lbl}</text>`;
    }

    // Сетка X + метки
    let xGrid = "", xLabels = "";
    times.forEach(t => {
        const d  = new Date(t);
        const hr = d.getHours();
        const x  = px(t);
        if(hr === 0)
            xGrid   += `<line x1="${x}" y1="${pad.t}" x2="${x}" y2="${pad.t+iH}" stroke="#444" stroke-dasharray="2 4"/>`;
        if(hr % 6 === 0)
            xLabels += `<text x="${x}" y="${H-6}" text-anchor="middle" font-size="9" fill="#555">${hr}:00</text>`;
    });

    // Линия текущего времени
    let nowLine = "";
    const nowTs = Date.now();
    if(nowTs >= tMin && nowTs <= tMax){
        const xNow = pad.l + (nowTs - tMin) / (tMax - tMin) * iW;
        nowLine = `<line x1="${xNow}" y1="${pad.t}" x2="${xNow}" y2="${pad.t+iH}"
                         stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-dasharray="4 3"/>`;
    }

    // Градиент цвета по скорости ветра
    const W_STOPS = [
        {offset:0,    color:"#7ec8ff"},
        {offset:0.13, color:"#67d7a7"},
        {offset:0.36, color:"#ffd166"},
        {offset:0.57, color:"#ff9f5c"},
        {offset:1,    color:"#ff6b6b"},
    ];
    const vMax = 25;
    function gradCol(spd){
        const t = Math.min(spd ?? 0, vMax) / vMax;
        // inline lerpHex (utils.js недоступен в forecast.html)
        const stops = W_STOPS;
        const cl = Math.max(0, Math.min(1, t));
        for(let i = 1; i < stops.length; i++){
            const a = stops[i-1], b = stops[i];
            if(cl <= b.offset){
                const u = (cl - a.offset) / (b.offset - a.offset);
                const hex = s => [parseInt(s.slice(1,3),16), parseInt(s.slice(3,5),16), parseInt(s.slice(5,7),16)];
                const [r1,g1,b1] = hex(a.color), [r2,g2,b2] = hex(b.color);
                const r = Math.round(r1+(r2-r1)*u);
                const g = Math.round(g1+(g2-g1)*u);
                const bv= Math.round(b1+(b2-b1)*u);
                return "#"+[r,g,bv].map(v=>v.toString(16).padStart(2,"0")).join("");
            }
        }
        return stops[stops.length-1].color;
    }

    // Соединительная пунктирная линия
    const pts = times.map((t, i) => ({ x: px(t), y: py(data[i] ?? 0) }));
    const connPts = pts.filter((_,i) => data[i] != null).map(p => `${p.x},${p.y}`).join(" ");
    const connectLine = connPts
        ? `<polyline points="${connPts}" fill="none" stroke="${cfg.color}" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="3 3"/>`
        : "";

    // Стрелки
    let arrows = "";
    times.forEach((t, i) => {
        const dir = data[i];
        if(dir == null || isNaN(dir)) return;
        const col = gradCol(spds[i]);
        const x = px(t);
        const y = py(dir);
        const rot = dir + 180;
        arrows += `<g transform="translate(${x},${y}) rotate(${rot})">
            <line x1="0" y1="-5" x2="0" y2="5" stroke="${col}" stroke-width="1.8" stroke-linecap="round"/>
            <polyline points="-2.5,-1 0,-5 2.5,-1" fill="none" stroke="${col}" stroke-width="1.8" stroke-linejoin="round"/>
        </g>`;
    });

    wrap.innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="display:block;">
        ${yGrid}${xGrid}${nowLine}${connectLine}${arrows}
        ${yLabels}${xLabels}
    </svg>`;

    // Тултип
    const svgEl = wrap.querySelector("svg");
    if(svgEl){
        svgEl.addEventListener("mousemove", e => {
            const rect = svgEl.getBoundingClientRect();
            const scaleX = W / rect.width;
            const mx = (e.clientX - rect.left) * scaleX;
            let best = 0, bestDist = Infinity;
            pts.forEach((p, i) => {
                const dist = Math.abs(p.x - mx);
                if(dist < bestDist){ bestDist = dist; best = i; }
            });
            fcShowTooltip(e, best, data, times, cfg);
        });
        svgEl.addEventListener("mouseleave", fcHideTooltip);
        svgEl.addEventListener("touchmove", e => {
            const touch = e.touches[0];
            const rect = svgEl.getBoundingClientRect();
            const scaleX = W / rect.width;
            const mx = (touch.clientX - rect.left) * scaleX;
            let best = 0, bestDist = Infinity;
            pts.forEach((p, i) => {
                const dist = Math.abs(p.x - mx);
                if(dist < bestDist){ bestDist = dist; best = i; }
            });
            fcShowTooltip(touch, best, data, times, cfg);
            e.preventDefault();
        }, { passive: false });
        svgEl.addEventListener("touchend", fcHideTooltip);
    }

    // Статистика — доминирующий румб через векторное суммирование
    if(statsBox){
        const dirs8 = ["С","СВ","В","ЮВ","Ю","ЮЗ","З","СЗ"];
        const rumbCounts = {};
        data.filter(v => v != null).forEach(v => {
            const r = dirs8[Math.round(v / 45) % 8];
            rumbCounts[r] = (rumbCounts[r] || 0) + 1;
        });
        const dominant = Object.entries(rumbCounts).sort((a,b) => b[1]-a[1])[0] || ["-", 0];
        let sinSum = 0, cosSum = 0, cnt = 0;
        data.forEach(v => { if(v != null){ sinSum += Math.sin(v*Math.PI/180); cosSum += Math.cos(v*Math.PI/180); cnt++; } });
        const meanDeg = cnt ? ((Math.atan2(sinSum/cnt, cosSum/cnt) * 180/Math.PI) + 360) % 360 : 0;
        const meanRumb = dirs8[Math.round(meanDeg / 45) % 8];

        // Средняя скорость
        const spdVals = spds.filter(v => v != null);
        const avgSpd = spdVals.length ? spdVals.reduce((a,b)=>a+b,0)/spdVals.length : null;
        const maxSpd = spdVals.length ? Math.max(...spdVals) : null;

        statsBox.style.display = "grid";
        statsBox.innerHTML = `
        <div class="fc-stat-card">
            <div class="fc-stat-label">Доминирующий</div>
            <div class="fc-stat-value" style="color:${cfg.color};">${dominant[0]}</div>
            <div class="fc-stat-time">${dominant[1]} ч</div>
        </div>
        <div class="fc-stat-card">
            <div class="fc-stat-label">Среднее</div>
            <div class="fc-stat-value" style="color:#ccc;">${meanRumb}</div>
            <div class="fc-stat-time">${Math.round(meanDeg)}°</div>
        </div>
        <div class="fc-stat-card">
            <div class="fc-stat-label">Сред. скорость</div>
            <div class="fc-stat-value" style="color:#8bc34a;">${avgSpd != null ? avgSpd.toFixed(1) : "-"} м/с</div>
            <div class="fc-stat-time">&nbsp;</div>
        </div>
        <div class="fc-stat-card">
            <div class="fc-stat-label">Макс. скорость</div>
            <div class="fc-stat-value" style="color:#ff9f5c;">${maxSpd != null ? maxSpd.toFixed(1) : "-"} м/с</div>
            <div class="fc-stat-time">&nbsp;</div>
        </div>`;
    }
}

// --- тултип графика ---
function fcShowTooltip(e, idx, data, times, cfg){
    let tip = document.getElementById("fcTooltip");
    if(!tip){
        tip = document.createElement("div");
        tip.id = "fcTooltip";
        tip.style.cssText = `
            position:fixed;z-index:999;pointer-events:none;
            background:rgba(20,20,20,0.97);border:1px solid #333;border-radius:10px;
            padding:10px 14px;font-size:12px;color:#eee;min-width:140px;
            box-shadow:0 4px 24px rgba(0,0,0,0.5);transition:opacity 0.1s;
        `;
        document.body.appendChild(tip);
    }
    const val = data[idx];
    const t = times[idx] ? new Date(times[idx]) : null;
    const timeStr = t && !isNaN(t)
        ? t.toLocaleString("ru-RU",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})
        : "";
    tip.innerHTML = `
        <div style="color:#888;margin-bottom:6px;font-size:11px;">${timeStr}</div>
        <div style="font-size:16px;font-weight:800;color:${cfg.color};">${val != null ? val.toFixed(1) + cfg.unit : "—"}</div>
        <div style="color:#aaa;font-size:11px;">${cfg.label}</div>
    `;
    tip.style.opacity = "1";
    const tipW = 160;
    const left = e.clientX + tipW + 20 > window.innerWidth ? e.clientX - tipW - 12 : e.clientX + 12;
    tip.style.left = left + "px";
    tip.style.top  = (e.clientY - 40) + "px";
}

function fcHideTooltip(){
    const tip = document.getElementById("fcTooltip");
    if(tip) tip.style.opacity = "0";
}

// --- погодные коды ---
function weatherCode(code, hour, cloud, rain, snow){
    const isDay = hour >= 6 && hour < 21;
    if(snow > 0)  return { icon:"🌨️", text:"Снег" };
    if(rain > 0.5) return { icon:"🌧️", text:"Дождь" };
    if(code >= 95) return { icon:"⛈️",  text:"Гроза" };
    if(code >= 80) return { icon:"🌦️", text:"Ливень" };
    if(code >= 71) return { icon:"🌨️", text:"Снегопад" };
    if(code >= 61) return { icon:"🌧️", text:"Дождь" };
    if(code >= 51) return { icon:"🌦️", text:"Морось" };
    if(code >= 45) return { icon:"🌫️", text:"Туман" };
    if(cloud > 80) return { icon:"☁️",  text:"Пасмурно" };
    if(cloud > 40) return { icon: isDay ? "⛅" : "🌙☁️", text:"Облачно" };
    return { icon: isDay ? "☀️" : "🌙", text:"Ясно" };
}

// --- уровень комфорта ---
function comfortLevel(h){
    const t    = h.temperature_2m;
    const feel = h.apparent_temperature;
    const w    = h.wind_speed_10m;
    const gust = h.wind_gusts_10m ?? w;
    const r    = (h.rain ?? 0) + (h.showers ?? 0);
    const snow = h.snowfall ?? 0;
    const rh   = h.relative_humidity_2m ?? 50;
    const vis  = h.visibility ?? 10000;
    const code = h.weather_code ?? 0;

    // Опасные явления — наивысший приоритет
    if(code >= 95)               return { comfort:"Гроза ⚡",       color:"#f9ca24" };
    if(snow > 1)                 return { comfort:"Снегопад",        color:"#a8d8ea" };
    if(vis < 200)                return { comfort:"Густой туман",    color:"#b2bec3" };
    if(r > 5)                    return { comfort:"Сильный дождь",   color:"#2980b9" };

    // Экстремальные температуры (по ощущаемой)
    if(feel < -15)               return { comfort:"Сильный мороз",   color:"#74b9ff" };
    if(feel < -5)                return { comfort:"Морозно",          color:"#a8d8ea" };
    if(feel > 37)                return { comfort:"Опасная жара",     color:"#d63031" };
    if(feel > 32)                return { comfort:"Очень жарко",      color:"#ff6b6b" };

    // Осадки умеренные
    if(r > 0.5)                  return { comfort:"Дождливо",         color:"#4a90d9" };

    // Ветер
    if(gust > 15)                return { comfort:"Шквалисто",        color:"#fd9644" };
    if(w > 10)                   return { comfort:"Ветрено",          color:"#ffd166" };

    // Духота: жарко + высокая влажность
    if(t > 26 && rh > 75)       return { comfort:"Душно",            color:"#e17055" };

    // Комфортные диапазоны по температуре воздуха
    if(t < 0)                    return { comfort:"Морозно",          color:"#a8d8ea" };
    if(t < 8)                    return { comfort:"Холодно",          color:"#74b9ff" };
    if(t < 14)                   return { comfort:"Прохладно",        color:"#55efc4" };
    if(t <= 25)                  return { comfort:"Комфортно",        color:"#5fe08f" };
    if(t <= 30)                  return { comfort:"Тепло",            color:"#fdcb6e" };
    return                              { comfort:"Жарко",            color:"#ff6b6b" };
}

// --- основная загрузка ---
async function load(){
    const API = `https://api.open-meteo.com/v1/forecast?latitude=46.43&longitude=30.74&hourly=temperature_2m,apparent_temperature,pressure_msl,relative_humidity_2m,weather_code,visibility,wind_speed_10m,wind_gusts_10m,wind_direction_10m,precipitation,precipitation_probability,showers,snowfall,snow_depth,shortwave_radiation,direct_radiation,diffuse_radiation,dew_point_2m,runoff,cloud_cover,cloud_cover_low,cloud_cover_mid,cloud_cover_high&models=${weatherModel}&timezone=auto&forecast_days=${forecastDays}&wind_speed_unit=ms`;
    const r    = await fetch(API);
    const data = await r.json();
    const h    = data.hourly;

    const hours = h.time.map((t, i) => ({
        time:                  t,
        temperature_2m:        h.temperature_2m[i],
        apparent_temperature:  h.apparent_temperature[i],
        pressure_msl:          h.pressure_msl[i],
        relative_humidity_2m:  h.relative_humidity_2m[i],
        weather_code:          h.weather_code[i],
        visibility:            h.visibility[i],
        wind_speed_10m:        h.wind_speed_10m[i],
        wind_gusts_10m:        h.wind_gusts_10m[i],
        wind_direction_10m:    h.wind_direction_10m[i],
        rain:                  h.precipitation[i] || 0,
        showers:               h.showers[i]       || 0,
        precip_prob:           h.precipitation_probability?.[i] ?? null,
        snowfall:              h.snowfall[i],
        snow_depth:            h.snow_depth[i],
        shortwave_radiation:   h.shortwave_radiation[i],
        direct_radiation:      h.direct_radiation[i],
        diffuse_radiation:     h.diffuse_radiation[i],
        dew_point_2m:          h.dew_point_2m[i],
        runoff:                h.runoff[i],
        cloud_cover:           h.cloud_cover[i],
        cloud_cover_low:       h.cloud_cover_low[i],
        cloud_cover_mid:       h.cloud_cover_mid[i],
        cloud_cover_high:      h.cloud_cover_high[i],
    }));

    // --- График ---
    const nowTime    = Date.now();
    const timesDates = h.time.map(t => new Date(t));
    const hoursToShow = 24 * (forecastDays - 1);

    let startIndex = timesDates.findIndex(t => t.getTime() >= nowTime);
    if(startIndex === -1) startIndex = 0;
    startIndex = Math.max(0, startIndex - 1);
    const endIndex = Math.min(startIndex + hoursToShow, hours.length);

    _fcHours = hours.slice(startIndex, endIndex);
    _fcTimes = h.time.slice(startIndex, endIndex);

    buildFcParamRow();
    renderForecastChart(_fcHours, _fcTimes);

// --- Почасовой прогноз ---
    const nowHour  = new Date().getHours();
    const next24   = hours.slice(nowHour, nowHour + 24 * (forecastDays - 1));
    const days     = ["Вс","Пн","Вт","Ср","Чт","Пт","Сб"];

    const tColors = [
        [62,200,255],[157,214,255],[95,224,143],[255,216,77],[255,107,107]
    ];
    function lerpRgb(norm){
        const seg = (tColors.length - 1) * norm;
        const i0  = Math.min(Math.floor(seg), tColors.length - 2);
        const f   = seg - i0;
        const a   = tColors[i0], b = tColors[i0+1];
        return [Math.round(a[0]+(b[0]-a[0])*f), Math.round(a[1]+(b[1]-a[1])*f), Math.round(a[2]+(b[2]-a[2])*f)];
    }

    let html = "";
    next24.forEach((h, i) => {
        const d         = new Date(h.time);
        const hr        = d.getHours();
        const w         = weatherCode(h.weather_code, hr, h.cloud_cover, h.rain, h.snowfall);
        const { comfort, color: c } = comfortLevel(h);
        const isNight   = hr < 6 || hr >= 23;
        const isCurrent = i === 0;

        if(i === 0 || days[d.getDay()] !== days[new Date(next24[i-1].time).getDay()])
            html += `<div class="day-header">${days[d.getDay()]}, ${d.getDate()}</div>`;

        // Тепловой фон
        const t      = h.temperature_2m;
        const tNorm  = Math.max(0, Math.min(1, (t + 20) / 60));
        const [r,g,b2] = lerpRgb(tNorm);
        const rowBg  = `rgba(${r},${g},${b2},${isNight ? 0.03 : 0.08})`;

        // Стрелка ветра (откуда дует → +180° = куда дует)
        const windDeg = h.wind_direction_10m ?? 0;
        const windHtml = `
            <div style="text-align:center;">
                <div style="font-size:15px;"><i style="display:inline-block;transform:rotate(${windDeg+180}deg);font-style:normal;">↑</i></div>
                <div style="font-size:12px;font-weight:600;">${Math.round(h.wind_speed_10m)}<span style="font-size:9px;color:#777;"> м/с</span></div>
            </div>`;

        const precip    = h.rain + h.showers;
        const precipPct = Math.min(100, precip / 10 * 100);
        const probPct   = h.precip_prob ?? 0;
        const cloudPct  = h.cloud_cover ?? 0;
        const cL = h.cloud_cover_low  ?? 0;
        const cM = h.cloud_cover_mid  ?? 0;
        const cH = h.cloud_cover_high ?? 0;

        function bar(pct, color, bg="#222"){
            return `<div style="flex:1;height:4px;background:${bg};border-radius:3px;overflow:hidden;">
                <div style="width:${pct}%;height:100%;background:${color};border-radius:3px;"></div>
            </div>`;
        }
        function barRow(label, pct, color, valStr, bg="#222"){
            return `<div style="display:flex;align-items:center;gap:8px;">
                <span class="label" style="width:80px;flex-shrink:0;">${label}</span>
                ${bar(pct, color, bg)}
                <span style="font-size:11px;color:#777;width:38px;text-align:right;flex-shrink:0;">${valStr}</span>
            </div>`;
        }

        html += `
        <div class="row" style="background:${rowBg};opacity:${isNight?0.6:1};${isCurrent?'border-color:#4fc3f7;':''}">
            <div class="summary" onclick="toggle(this)">
                <div class="indicator-line" style="background:${c};"></div>
                <div style="width:16%;font-size:13px;color:${isCurrent?'#4fc3f7':'#aaa'};font-weight:${isCurrent?700:400};">${hr}:00</div>
                <div style="width:18%;font-size:1.6em;text-align:center;">${w.icon}</div>
                <div style="width:32%;text-align:center;font-weight:800;font-size:15px;color:${t>0?'#ff8f00':'#00e5ff'}">${t.toFixed(1)}°</div>
                <div style="width:34%;">${windHtml}</div>
            </div>
            <div class="details-body"><div>
                <div class="status-line" style="color:${c}">${w.text} · ${comfort}</div>

                <!-- БЛОК: Осадки -->
                <div style="padding:10px 0 6px;border-top:1px solid #222;display:flex;flex-direction:column;gap:5px;">
                    <div style="font-size:11px;color:#555;margin-bottom:2px;font-weight:600;letter-spacing:0.04em;">ОСАДКИ</div>
                    ${barRow("Кол-во", precipPct, "#4a90d9", precip > 0 ? precip.toFixed(1)+" мм/ч" : "0 мм/ч", "#1e2a3a")}
                    ${barRow("Вер-ть", probPct, "#5b8fc9", probPct + "%")}
                </div>

                <!-- БЛОК: Облачность -->
                <div style="padding:8px 0 6px;border-top:1px solid #222;display:flex;flex-direction:column;gap:5px;">
                    <div style="font-size:11px;color:#555;margin-bottom:2px;font-weight:600;letter-spacing:0.04em;">ОБЛАЧНОСТЬ</div>
                    ${barRow("Общая",       cloudPct, "#666", cloudPct + "%")}
                    ${barRow("Высокие (H)", cH, "#dde8ff", cH + "%")}
                    ${barRow("Средние (M)", cM, "#aab8cc", cM + "%")}
                    ${barRow("Низкие (L)",  cL, "#7ec8ff", cL + "%")}
                    
                </div>

                <!-- БЛОК: Параметры -->
                <div style="padding:8px 0 4px;border-top:1px solid #222;">
                    <div style="font-size:11px;color:#555;margin-bottom:6px;font-weight:600;letter-spacing:0.04em;">ПАРАМЕТРЫ</div>
                    <div class="grid-container">
                        <div><span class="label">Ощущается</span><div class="val">${h.apparent_temperature.toFixed(1)}°</div></div>
                        <div><span class="label">Влажность</span><div class="val">${h.relative_humidity_2m}%</div></div>
                        <div><span class="label">Ветер</span><div class="val">${windDir(windDeg)} ${Math.round(h.wind_speed_10m)} м/с</div></div>
                        <div><span class="label">Порывы</span><div class="val">${Math.round(h.wind_gusts_10m)} м/с</div></div>
                        <div><span class="label">Давление</span><div class="val">${h.pressure_msl.toFixed(1)} гПа</div></div>
                        <div><span class="label">Видимость</span><div class="val">${(h.visibility/1000).toFixed(0)} км</div></div>
                        ${h.snowfall > 0 ? `<div><span class="label">Снег</span><div class="val">${h.snowfall} мм</div></div>` : ""}
                        ${h.snow_depth > 0 ? `<div><span class="label">Покров</span><div class="val">${h.snow_depth} см</div></div>` : ""}
                    </div>
                </div>

            </div></div>
        </div>`;
    });
    document.getElementById("forecast").innerHTML = html;
}

load();
</script>
</div>
