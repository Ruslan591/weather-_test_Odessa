<script>
 async function exportDB(){

  if(!db){
    await initDB();
  }

  const tx = db.transaction("stats","readonly");
  const store = tx.objectStore("stats");

  const req = store.getAll();

  req.onsuccess = () => {

    const data = req.result;

data.sort((a, b) => Number(b.synopTime) - Number(a.synopTime));

    if(!data.length){
      alert("База пустая");
      return;
    }

    const json = JSON.stringify(data, null, 2);

    const blob = new Blob([json], {
      type: "application/json"
    });

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "baza/modelStats_backup.json";
    a.click();

    URL.revokeObjectURL(url);
  };

}

let currentPeriod = "all";
let currentParam = "temp";
let chartMode = "error"; // "error" или "value"
let chartInstance = null;
const models=[  
"ecmwf_ifs",  
"icon_eu",  
"ukmo_global_deterministic_10km",  
"meteofrance_arpege_europe",  
"jma_gsm",

];

function setParam(p){
currentParam = p;

}

function modelLabel(m){

switch(m){

case "ecmwf_ifs": return "ECMWF";
case "icon_eu": return "ICON";
case "ukmo_global_deterministic_10km": return "UKMO";
case "meteofrance_arpege_europe": return "ARPEGE";
case "jma_gsm": return "JMA";
case "gfs_global": return "GFS";

}

}

let db;

function setMode(mode){
    chartMode = mode;
    drawChart();
}

async function drawChart(){

let stats = await loadStats();

const now = Date.now();

stats = stats.filter(d => {

const t = new Date(d.time).getTime();

if(currentPeriod === "24h") return now - t <= 24*3600*1000;
if(currentPeriod === "3d") return now - t <= 3*24*3600*1000;

return true;

});

if(!stats.length) return;

const labels = stats.map(d => {

const t = d.synopTime; // "202603161200"

const year = t.slice(0,4);
const month = t.slice(4,6);
const day = t.slice(6,8);
const hour = t.slice(8,10);

return `${day}.${month} ${hour}:00`;

});

const datasets = models.map(m => {

const data = stats.map(d => {

const model = d.models[m];
if(!model) return null;

switch(currentParam){

case "temp":
return chartMode === "error"
    ? Math.abs(model.temp - d.obs.temp)
    : model.temp;

case "pressure":
return chartMode === "error"
    ? Math.abs(model.pressure - d.obs.pressure)
    : model.pressure;

case "wind":
return chartMode === "error"
    ? Math.abs(model.wind - d.obs.wind)
    : model.wind;

case "windDir":
return chartMode === "error"
    ? windDirError(model.windDir, d.obs.windDir)
    : model.windDir;

}

});

return {
label: modelLabel(m),
data: data,
borderWidth: 2,
fill: false
};

});

if(chartMode === "value"){

    const synopData = stats.map(d => {

        switch(currentParam){
            case "temp": return d.obs.temp;
            case "pressure": return d.obs.pressure;
            case "wind": return d.obs.wind;
            case "windDir": return d.obs.windDir;
        }

    });

    datasets.push({
        label: "SYNOP",
        data: synopData,
        borderWidth: 2,
        fill: false,
        pointRadius: 3,
        tension: 0.1
    });

}

const ctx = document.getElementById("chart");

if(chartInstance){
chartInstance.destroy();
}

let yMin, yMax;

if(chartMode === "value" && currentParam === "pressure"){

    const allValues = [];

    stats.forEach(d => {
        if(d.obs.pressure) allValues.push(d.obs.pressure);

        for(const m of models){
            if(d.models[m]){
                allValues.push(d.models[m].pressure);
            }
        }
    });

    const min = Math.min(...allValues);
    const max = Math.max(...allValues);

    yMin = min - 0.5;
    yMax = max + 0.5;
}

chartInstance = new Chart(ctx,{
type:"line",
data:{
labels:labels,
datasets:datasets
},
options:{
responsive:true,
plugins:{
legend:{
position:"bottom",
labels:{
color:"#eee",
boxWidth:12,
padding:15
},
maxHeight:60
}
},
scales:{
x:{
ticks:{
color:"#eee",
maxRotation:45,
minRotation:45,
autoSkip:true,
maxTicksLimit:8
}
},
y:{
beginAtZero:false,
min: yMin,
max: yMax,
ticks:{
color:"#eee"
},
title:{
display:true,
text: getYAxisLabel(),
color:"#eee"
}
}
}
}
});


}

case "wind": return "Ошибка ветра м/с";

}

function initDB(){
return new Promise((resolve,reject)=>{

const req = indexedDB.open("modelStats",1);

req.onupgradeneeded = e=>{
db = e.target.result;
db.createObjectStore("stats",{keyPath:"time"});
};

req.onsuccess = e=>{
db = e.target.result;
resolve();
};

req.onerror = reject;

});
}



function saveData(data){

const tx = db.transaction("stats","readwrite");
const store = tx.objectStore("stats");

store.put(data);

}

function loadStats(){

return new Promise(res=>{

const tx=db.transaction("stats","readonly");
const store=tx.objectStore("stats");

const r=store.getAll();

r.onsuccess=()=>res(r.result);

});

}

function fetchWithTimeout(url, ms = 10000){
    return Promise.race([
        fetch(url),
        new Promise((_, reject) =>
            setTimeout(() => reject("Timeout"), ms)
        )
    ]);
}

function saveProxyTime(proxyTimes, proxy, ms, limit = 10) {
    if (!proxyTimes[proxy]) {
        proxyTimes[proxy] = [];
    }

    proxyTimes[proxy].push(ms);

    if (proxyTimes[proxy].length > limit) {
        proxyTimes[proxy] = proxyTimes[proxy].slice(-limit);
    }
}

// ======== Сохранение времени работы прокси ========
function saveProxyTime(proxyTimes, proxy, ms, limit = 10) {
    if (!proxyTimes[proxy]) proxyTimes[proxy] = [];
    proxyTimes[proxy].push(ms);
    if (proxyTimes[proxy].length > limit) {
        proxyTimes[proxy] = proxyTimes[proxy].slice(-limit);
    }
}

// ======== Проверка IndexedDB ========
async function recordExists(key) {
    return new Promise((resolve, reject) => {
        const tx = db.transaction("stats", "readonly");
        const store = tx.objectStore("stats");
        const request = store.get(key);

        request.onsuccess = () => resolve(!!request.result);
        request.onerror = () => reject(request.error);
    });
}

// ======== Основная функция загрузки SYNOP ========
async function loadSynop() {
    const stationCode = typeof STATION_CODE !== "undefined" ? STATION_CODE : "33837";
    const cacheBust = Date.now();

    const ogimet = `https://www.ogimet.com/display_synops2.php?lang=en&lugar=${stationCode}&tipo=ALL&ord=REV&nil=SI&fmt=txt&_=${cacheBust}`;

    const proxies = [
        "https://api.allorigins.win/raw?url=",
        "https://corsproxy.io/?",
        "https://proxy.cors.sh/",
        "https://cors.x2u.in/"
    ];

    const proxyStorageKey = "synopProxyTimes";
    let proxyTimes = JSON.parse(localStorage.getItem(proxyStorageKey) || "{}");
    proxies.forEach(p => { if (!proxyTimes[p]) proxyTimes[p] = []; });

    function extractTelegramKey(text) {
        const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
        for (const line of lines) {
            const m = line.match(/^(\d{12})\s+AAXX\b/);
            if (m) return m[1];
        }
        return null;
    }

    function extractAAXXLine(text) {
        const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
        return lines.find(l => /AAXX\b/.test(l)) || null;
    }

    // ======== Гонка прокси ========
    const requests = proxies.map(proxy => {
        return new Promise(async (resolve, reject) => {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), 8000);
            const started = performance.now();

            try {
                const url = proxy + encodeURIComponent(ogimet);
                const r = await fetch(url, { signal: controller.signal, cache: "no-store" });
                if (!r.ok) throw new Error("HTTP " + r.status);

                const text = await r.text();
                if (!text || !text.trim()) throw new Error("Пустой ответ");

                const telegramKey = extractTelegramKey(text);
                const line = extractAAXXLine(text);

                if (!telegramKey) throw new Error("Ключ телеграммы YYYYMMDDHHMM не найден");
                if (!line) throw new Error("SYNOP не найден");

                const ms = Math.round(performance.now() - started);
                saveProxyTime(proxyTimes, proxy, ms);

                console.log(`SYNOP proxy ok: ${proxy} (${ms} мс), key=${telegramKey}`);
                resolve({ line, text, proxy, ms, telegramKey });
            } catch (e) {
                const ms = Math.round(performance.now() - started);
                saveProxyTime(proxyTimes, proxy, ms);
                console.log(`Proxy fail: ${proxy} (${ms} мс)`, e);
                reject(e);
            } finally {
                clearTimeout(timer);
            }
        });
    });

    const settled = await Promise.allSettled(requests);
    localStorage.setItem(proxyStorageKey, JSON.stringify(proxyTimes));

    const successResults = settled
        .filter(r => r.status === "fulfilled")
        .map(r => r.value);

    if (!successResults.length) throw new Error("Все прокси SYNOP не ответили");

    // ======== Выбираем самую свежую телеграмму ========
    successResults.sort((a, b) => {
        if (a.telegramKey !== b.telegramKey) {
            return b.telegramKey.localeCompare(a.telegramKey); // свежее время выше
        }
        return a.ms - b.ms; // если одинаковое время, берём быстрее
    });

    const line = successResults[0].line;
    const telegramKey = successResults[0].telegramKey;

    // 🚫 БЛОКИРУЕМ битые SYNOP
if(line.includes("NILL")){
    console.log("NILL SYNOP пропущен:", line);
    throw new Error("NILL SYNOP");
}

    // ======== IndexedDB ========
    if (!db) await initDB();
    const exists = await recordExists(telegramKey);
    if (exists) {
        console.log("Телеграмма уже есть в IndexedDB, пропускаем обработку");
        return parseSynop(line);
    }

    // ======== Сохраняем телеграмму ========
    saveData({ time: telegramKey, text: successResults[0].text });

    return parseSynop(line);
}

function parseSynop(line){
    const parts = line.trim().split(" ");
    
    const synopTime = parts[0];
    
    let temp = null;
    let pressure = null;
    let wind = null;
    let windDir = null;

    parts.forEach((g, i) => {
        // Температура: группа начинается с 1
        if(g.startsWith("1")) {
            const sign = g[1] === "1" ? -1 : 1;
            temp = sign * parseInt(g.slice(2)) / 10;
        }

        // Давление: группа начинается с 4
        if(g.startsWith("4")) {
            pressure = 1000 + parseInt(g.slice(1)) / 10;
        }

        // Ветер: 4-я группа после AAXX
        // у нас g — любая группа, ищем четвёртую
        // Обычно это после "AAXX код станции"
        // Для твоего примера parts = ["AAXX","16091","33837","42982","60502",...]
        // 60502 — 4-я после AAXX: index 4
    });

    // точная 4-я группа после AAXX
    const aaxxi = parts.indexOf("AAXX");
    if(aaxxi >= 0 && parts.length > aaxxi + 4){
        const windGroup = parts[aaxxi + 4];
        // 2-я и 3-я цифры → направление /10
        windDir = parseInt(windGroup.slice(1,3)) * 10;
        // 4-я и 5-я → скорость м/с
        wind = parseInt(windGroup.slice(3,5));
    }

    return {
time: synopTime,
temp,
pressure,
wind,
windDir,
synop: line
};
}

async function loadForecast(model){

const url =
`https://api.open-meteo.com/v1/forecast?latitude=46.4406&longitude=30.7703&hourly=temperature_2m,pressure_msl,wind_speed_10m,wind_direction_10m&models=${model}&forecast_days=1&timezone=UTC&wind_speed_unit=ms`;

const r = await fetchWithTimeout(url);
const d = await r.json();

return d.hourly;

}

function error(f,s){

return{

temp:f.temperature_2m-s.temp,
pressure:f.pressure_msl-s.pressure,
wind:f.wind_speed_10m-s.wind

};

}

async function synopExists(synopTime){

const tx = db.transaction("stats","readonly");
const store = tx.objectStore("stats");

const req = store.getAll();

return new Promise(res=>{
req.onsuccess = ()=>{
const exists = req.result.some(r => r.synopTime === synopTime);
res(exists);
};
});

}

async function verifyAll(){

if(!db){
await initDB();
}
const rating = document.getElementById("rating");
rating.innerHTML="Загрузка...";

try{

rating.innerHTML = "Загрузка SYNOP...";
const synop = await loadSynop();
// проверяем есть ли уже такая сводка
const exists = await synopExists(synop.time);

if(exists){
    rating.innerHTML = "Данные уже есть (обновление не требуется)";
    return;
}


rating.innerHTML = "Загрузка моделей...";
const forecasts = {};

const results = await Promise.all(
    models.map(m => loadForecast(m))
);

rating.innerHTML = "Обработка данных...";
models.forEach((m,i)=>{
    forecasts[m] = results[i];
});

// берём время из первой модели
const forecastTimes = forecasts[models[0]].time;

const targetTime =
synop.time.slice(0,4)+"-"+
synop.time.slice(4,6)+"-"+
synop.time.slice(6,8)+"T"+
synop.time.slice(8,10)+":00";

const hourIndex = forecastTimes.findIndex(t => t.startsWith(targetTime));

if(hourIndex === -1){
    throw "Не найдено совпадение времени прогноза и SYNOP";
}

const modelsData = {};

for(const m of models){

    const h = forecasts[m];

    modelsData[m] = {
        temp: h.temperature_2m[hourIndex],
        pressure: h.pressure_msl[hourIndex],
        wind: h.wind_speed_10m[hourIndex],
        windDir: Math.round(h.wind_direction_10m[hourIndex] / 10) * 10
    };

}

const record = {
time: new Date().toISOString(),
synopTime: synop.time,
obs: synop,
models: modelsData,
hourIndex: hourIndex
};

saveData(record);

rating.innerHTML = "Данные записаны";





}catch(e){

rating.innerHTML="Ошибка: "+e;

}

}

function windDirError(a,b){

let diff = Math.abs(a - b);

if(diff > 180){
diff = 360 - diff;
}

return diff;

}

function setPeriod(p){

currentPeriod = p;

render();
drawChart();

}

async function render(){

let periodLabel = "";

if(currentPeriod === "24h") periodLabel = " (24 часа)";
if(currentPeriod === "3d") periodLabel = " (3 дня)";

let stats = await loadStats();

const now = Date.now();

stats = stats.filter(d => {

const t = new Date(d.time).getTime();

if(currentPeriod === "24h") return now - t <= 24*3600*1000;
if(currentPeriod === "3d") return now - t <= 3*24*3600*1000;

return true;

});

if(!stats.length){
document.getElementById("rating").innerHTML =
"Нет данных. Нажмите «Обновить проверку»";
return;
}

const errors = {};

models.forEach(m=>{
errors[m] = {
temp: [],
pressure: [],
wind: [],
windDir: []
};
});

stats.forEach(d=>{

for(const m in d.models){

const model = d.models[m];

errors[m].temp.push(Math.abs(model.temp - d.obs.temp));
errors[m].pressure.push(Math.abs(model.pressure - d.obs.pressure));
errors[m].wind.push(Math.abs(model.wind - d.obs.wind));
errors[m].windDir.push(
windDirError(model.windDir, d.obs.windDir)
);

}

});

function getMax(param){

let max = 0;

for(const m of models){
const arr = errors[m][param];
if(arr.length){
const localMax = Math.max(...arr);
if(localMax > max) max = localMax;
}
}

return max || 1;
}

const maxTemp = getMax("temp");
const maxPressure = getMax("pressure");
const maxWind = getMax("wind");
const maxWindDir = getMax("windDir");

function avgNorm(arr, max){

if(!arr.length) return 1;

const sum = arr.reduce((a,b)=>a + (b / max), 0);

return sum / arr.length;

}

const avg = arr =>
arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 999;

function buildRating(param, max){

let r = [];

for(const m of models){

r.push({
model:m,
value:avgNorm(errors[m][param], max)
});

}

r.sort((a,b)=>a.value-b.value);

return r;

}

const tempRating = buildRating("temp", maxTemp);
const pressRating = buildRating("pressure", maxPressure);
const windRating = buildRating("wind", maxWind);
const windDirRating = buildRating("windDir", maxWindDir);

let totalRating = [];

for(const m of models){

const score =
avgNorm(errors[m].temp, maxTemp) * 2 +
avgNorm(errors[m].pressure, maxPressure) +
avgNorm(errors[m].wind, maxWind) +
avgNorm(errors[m].windDir, maxWindDir);

totalRating.push({
model:m,
value:score
});

}

totalRating.sort((a,b)=>a.value-b.value);
function makeBlock(title,data,unit){

let html = `<h3>${title}</h3>`;

data.forEach((r,i)=>{

html += `
<div class="row">
<div>${i+1}. ${modelLabel(r.model)}</div>
<div>${r.value.toFixed(2)} ${unit}</div>
</div>
`;

});

return html;

}


let html = `<b>Рейтинг моделей${periodLabel}</b><br><br>`;

html += makeBlock("Температура",tempRating,"°C");
html += "<br>";
html += makeBlock("Давление",pressRating,"hPa");
html += "<br>";
html += makeBlock("Ветер",windRating,"м/с");
html += "<br>";
html += makeBlock("Направление ветра",windDirRating,"°");
html += "<br>";
html += makeBlock("Итоговый рейтинг моделей",totalRating,"score");
document.getElementById("rating").innerHTML = html;

}

}

// удаление битых данных
async function cleanDB(){

    if(!db){
        await initDB();
    }

    const tx = db.transaction("stats","readwrite");
    const store = tx.objectStore("stats");

    const req = store.getAll();

    req.onsuccess = async () => {

        const data = req.result;

        let removed = 0;

        data.forEach(d => {

            if(!d.obs || !d.obs.synop || d.obs.synop.includes("NILL")){
                store.delete(d.time);
                removed++;
            }

        });

        alert("Удалено записей: " + removed);

        // 👇 обновляем экран
        await render();
        await drawChart();

    };

}

async function autoUpdate(){

    try{
        if(!db){
            await initDB();
        }

        await verifyAll();

    }catch(e){
        console.log("Auto update error:", e);
    }

    try{
        await render();
        await drawChart();
        
        // обновляем индикатор на странице
        document.getElementById("lastUpdate").innerText =
            "Последнее обновление: " + new Date().toLocaleTimeString();

    }catch(e){
        console.log("Render error:", e);
    }

    // следующий запуск через 30 минут
    setTimeout(autoUpdate, 1800000);
}

// первый запуск сразу
autoUpdate();
