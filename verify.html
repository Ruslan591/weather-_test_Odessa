 async function exportDB(){

  if(!db){
    await initDB();
  }

  const tx = db.transaction("stats","readonly");
  const store = tx.objectStore("stats");

  const req = store.getAll();

  req.onsuccess = () => {

    const data = req.result;

data.sort((a, b) => Number(b.synopTime) - Number(a.synopTime));

    if(!data.length){
      alert("База пустая");
      return;
    }

    const json = JSON.stringify(data, null, 2);

    const blob = new Blob([json], {
      type: "application/json"
    });

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "baza/modelStats_backup.json";
    a.click();

    URL.revokeObjectURL(url);
  };

}

const month = t.slice(4,6);

const hour = t.slice(8,10);

return `${day}.${month} ${hour}:00`;

});

const data = stats.map(d => {

const model = d.models[m];

switch(currentParam){

case "temp":

    ? Math.abs(model.temp - d.obs.temp)

case "pressure":

    ? Math.abs(model.pressure - d.obs.pressure)

case "wind":
return chartMode === "error"
    ? Math.abs(model.wind - d.obs.wind)
    : model.wind;

case "windDir":
return chartMode === "error"
    ? windDirError(model.windDir, d.obs.windDir)

}

});

return {
label: modelLabel(m),
data: data,
borderWidth: 2,
fill: false
};

function fetchWithTimeout(url, ms = 10000){
    return Promise.race([
        fetch(url),
        new Promise((_, reject) =>
            setTimeout(() => reject("Timeout"), ms)
        )
    ]);
}

function saveProxyTime(proxyTimes, proxy, ms, limit = 10) {
    if (!proxyTimes[proxy]) proxyTimes[proxy] = [];
    proxyTimes[proxy].push(ms);
    if (proxyTimes[proxy].length > limit) {
        proxyTimes[proxy] = proxyTimes[proxy].slice(-limit);
    }
}

async function loadSynopAll() {
    const stationCode = "33837";
    const cacheBust = Date.now();
    const ogimet = `https://www.ogimet.com/display_synops2.php?lang=en&lugar=${stationCode}&tipo=ALL&ord=REV&nil=SI&fmt=txt&ndays=10&_=${cacheBust}`;

    const proxies = [
        "https://api.allorigins.win/raw?url=",
        "https://corsproxy.io/?",
        "https://proxy.cors.sh/",
        "https://cors.x2u.in/"
    ];

    const proxyStorageKey = "synopProxyTimes";
    let proxyTimes = JSON.parse(localStorage.getItem(proxyStorageKey) || "{}");

    const requests = proxies.map(proxy => new Promise(async (resolve, reject) => {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 10000);
        const started = performance.now();
        try {
            const url = proxy + encodeURIComponent(ogimet);
            const r = await fetch(url, { signal: controller.signal, cache: "no-store" });
            if (!r.ok) throw new Error("HTTP " + r.status);
            const text = await r.text();
            if (!text || !text.trim()) throw new Error("Пустой ответ");
            const ms = Math.round(performance.now() - started);
            saveProxyTime(proxyTimes, proxy, ms);
            resolve({ text, proxy, ms });
        } catch (e) {
            const ms = Math.round(performance.now() - started);
            saveProxyTime(proxyTimes, proxy, ms);
            reject(e);
        } finally {
            clearTimeout(timer);
        }
    }));

    const settled = await Promise.allSettled(requests);
    localStorage.setItem(proxyStorageKey, JSON.stringify(proxyTimes));

    const successResults = settled
        .filter(r => r.status === "fulfilled")
        .map(r => r.value);

    if (!successResults.length) throw new Error("Все прокси SYNOP не ответили");

    // Выбираем самый длинный ответ (больше данных)
    successResults.sort((a, b) => b.text.length - a.text.length);
    const text = successResults[0].text;

    return parseAllSynops(text);
}

function parseAllSynops(text) {
    const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
    const result = [];

    for (let i = 0; i < lines.length; i++) {
        const keyMatch = lines[i].match(/^(\d{12})\s+AAXX\b/);
        if (!keyMatch) continue;

        const telegramKey = keyMatch[1];

        // Ищем строку с AAXX среди текущей и следующих строк
        let synopLine = null;
        for (let j = i; j < Math.min(i + 5, lines.length); j++) {
            if (/AAXX\b/.test(lines[j])) {
                synopLine = lines[j];
                break;
            }
        }

        if (!synopLine) continue;
        if (synopLine.includes("NILL")) continue;

        try {
            const parsed = parseSynop(synopLine, telegramKey);
            if (parsed && parsed.temp !== null) {
                result.push({ telegramKey, synopLine, parsed });
            }
        } catch (e) {
            console.log("Ошибка парсинга строки:", synopLine, e);
        }
    }

    return result;
}

function parseSynop(line, telegramKey) {
    const parts = line.trim().split(" ");

    // telegramKey передаётся снаружи (из строки YYYYMMDDHHMM)
    const synopTime = telegramKey;

    let temp = null;
    let pressure = null;
    let wind = null;
    let windDir = null;

    parts.forEach(g => {
        if (/^1[01]\d{3}$/.test(g)) {
            const sign = g[1] === "1" ? -1 : 1;
            temp = sign * parseInt(g.slice(2)) / 10;
        }
        if (/^4\d{4}$/.test(g)) {
            const val = parseInt(g.slice(1));
            // значения < 500 → 1000+, иначе 900+
            pressure = val < 5000 ? 1000 + val / 10 : 900 + val / 10;
        }
    });

    const aaxxi = parts.indexOf("AAXX");
    if (aaxxi >= 0 && parts.length > aaxxi + 4) {
        const windGroup = parts[aaxxi + 4];
        if (/^\d{5}$/.test(windGroup)) {
            windDir = parseInt(windGroup.slice(1, 3)) * 10;
            wind = parseInt(windGroup.slice(3, 5));
        }
    }

    return { time: synopTime, temp, pressure, wind, windDir, synop: line };
}

async function verifyMissing(statusEl) {
    if (!db) await initDB();

    if (statusEl) statusEl.innerHTML = "Загрузка SYNOP...";

    let allSynops;
    try {
        allSynops = await loadSynopAll();
    } catch (e) {
        console.log("Ошибка загрузки SYNOP:", e);
        if (statusEl) statusEl.innerHTML = "Ошибка загрузки SYNOP: " + e;
        return 0;
    }

    console.log(`Получено ${allSynops.length} сводок от ogimet`);

    // Фильтруем только те, которых нет в базе
    const missing = [];
    for (const s of allSynops) {
        const exists = await synopExists(s.telegramKey);
        if (!exists) missing.push(s);
    }

    console.log(`Пропущенных сводок: ${missing.length}`);

    if (!missing.length) {
        if (statusEl) statusEl.innerHTML = "Данные актуальны";
        return 0;
    }

    // Для open-meteo нужен диапазон дат
    // Берём максимум past_days из пропущенных сводок
    const now = Date.now();
    let maxAgeDays = 0;
    for (const s of missing) {
        const tk = s.telegramKey;
        const d = new Date(`${tk.slice(0,4)}-${tk.slice(4,6)}-${tk.slice(6,8)}T${tk.slice(8,10)}:00:00Z`);
        const ageDays = (now - d.getTime()) / 86400000;
        if (ageDays > maxAgeDays) maxAgeDays = ageDays;
    }
    const pastDays = Math.min(Math.ceil(maxAgeDays) + 1, 16); // open-meteo max 16

    if (statusEl) statusEl.innerHTML = `Загрузка моделей (${missing.length} сводок)...`;

    // Загружаем все модели одним запросом с past_days
    let forecasts = {};
    try {
        const results = await Promise.all(
            models.map(m => loadForecastPast(m, pastDays))
        );
        models.forEach((m, i) => { forecasts[m] = results[i]; });
    } catch (e) {
        console.log("Ошибка загрузки моделей:", e);
        if (statusEl) statusEl.innerHTML = "Ошибка загрузки моделей: " + e;
        return 0;
    }

    let saved = 0;

    for (const s of missing) {
        const synop = s.parsed;
        const tk = s.telegramKey;

        const targetTime =
            tk.slice(0,4) + "-" + tk.slice(4,6) + "-" + tk.slice(6,8) +
            "T" + tk.slice(8,10) + ":00";

        const forecastTimes = forecasts[models[0]].time;
        const hourIndex = forecastTimes.findIndex(t => t.startsWith(targetTime));

        if (hourIndex === -1) {
            console.log("Не найден час прогноза для", tk);
            continue;
        }

        const modelsData = {};
        for (const m of models) {
            const h = forecasts[m];
            modelsData[m] = {
                temp: h.temperature_2m[hourIndex],
                pressure: h.pressure_msl[hourIndex],
                wind: h.wind_speed_10m[hourIndex],
                windDir: Math.round(h.wind_direction_10m[hourIndex] / 10) * 10
            };
        }

        const record = {
            time: new Date().toISOString(),
            synopTime: tk,
            obs: synop,
            models: modelsData,
            hourIndex
        };

        saveData(record);
        saved++;
        console.log("Записана сводка:", tk);
    }

    if (statusEl) statusEl.innerHTML = saved > 0
        ? `Добавлено новых записей: ${saved}`
        : "Данные актуальны";

    return saved;
}

// Загрузка модели с past_days
async function loadForecastPast(model, pastDays) {
    const url =
        `https://api.open-meteo.com/v1/forecast?latitude=46.4406&longitude=30.7703` +
        `&hourly=temperature_2m,pressure_msl,wind_speed_10m,wind_direction_10m` +
        `&models=${model}&forecast_days=1&past_days=${pastDays}&timezone=UTC&wind_speed_unit=ms`;
    const r = await fetchWithTimeout(url, 15000);
    const d = await r.json();
    return d.hourly;
}

function windDirError(a,b){

let diff = Math.abs(a - b);

if(diff > 180){
diff = 360 - diff;
}

return diff;

}

function setPeriod(p){

currentPeriod = p;

render();
drawChart();

}

async function render(){

let periodLabel = "";

if(currentPeriod === "24h") periodLabel = " (24 часа)";
if(currentPeriod === "3d") periodLabel = " (3 дня)";

let stats = await loadStats();

const now = Date.now();

stats = stats.filter(d => {

const t = new Date(d.time).getTime();

if(currentPeriod === "24h") return now - t <= 24*3600*1000;
if(currentPeriod === "3d") return now - t <= 3*24*3600*1000;

return true;

});

if(!stats.length){
document.getElementById("rating").innerHTML =
"Нет данных. Нажмите «Обновить проверку»";
return;
}

const errors = {};

models.forEach(m=>{
errors[m] = {
temp: [],
pressure: [],
wind: [],
windDir: []
};
});

stats.forEach(d=>{

for(const m in d.models){

const model = d.models[m];

errors[m].temp.push(Math.abs(model.temp - d.obs.temp));
errors[m].pressure.push(Math.abs(model.pressure - d.obs.pressure));
errors[m].wind.push(Math.abs(model.wind - d.obs.wind));
errors[m].windDir.push(
windDirError(model.windDir, d.obs.windDir)
);

}

});

function getMax(param){

let max = 0;

for(const m of models){
const arr = errors[m][param];
if(arr.length){
const localMax = Math.max(...arr);
if(localMax > max) max = localMax;
}
}

return max || 1;
}

const maxTemp = getMax("temp");
const maxPressure = getMax("pressure");
const maxWind = getMax("wind");
const maxWindDir = getMax("windDir");

function avgNorm(arr, max){

if(!arr.length) return 1;

const sum = arr.reduce((a,b)=>a + (b / max), 0);

return sum / arr.length;

}

const avg = arr =>
arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 999;

function buildRating(param, max){

let r = [];

for(const m of models){

r.push({
model:m,
value:avgNorm(errors[m][param], max)
});

}

r.sort((a,b)=>a.value-b.value);

return r;

}

const tempRating = buildRating("temp", maxTemp);
const pressRating = buildRating("pressure", maxPressure);
const windRating = buildRating("wind", maxWind);
const windDirRating = buildRating("windDir", maxWindDir);

let totalRating = [];

for(const m of models){

const score =
avgNorm(errors[m].temp, maxTemp) * 2 +
avgNorm(errors[m].pressure, maxPressure) +
avgNorm(errors[m].wind, maxWind) +
avgNorm(errors[m].windDir, maxWindDir);

totalRating.push({
model:m,
value:score
});

}

totalRating.sort((a,b)=>a.value-b.value);
function makeBlock(title,data,unit){

let html = `<h3>${title}</h3>`;

data.forEach((r,i)=>{

html += `
<div class="row">
<div>${i+1}. ${modelLabel(r.model)}</div>
<div>${r.value.toFixed(2)} ${unit}</div>
</div>
`;

});

return html;

}


let html = `<b>Рейтинг моделей${periodLabel}</b><br><br>`;

html += makeBlock("Температура",tempRating,"°C");
html += "<br>";
html += makeBlock("Давление",pressRating,"hPa");
html += "<br>";
html += makeBlock("Ветер",windRating,"м/с");
html += "<br>";
html += makeBlock("Направление ветра",windDirRating,"°");
html += "<br>";
html += makeBlock("Итоговый рейтинг моделей",totalRating,"score");
document.getElementById("rating").innerHTML = html;

}

// удаление битых данных
async function cleanDB(){

    if(!db){
        await initDB();
    }

    const tx = db.transaction("stats","readwrite");
    const store = tx.objectStore("stats");

    const req = store.getAll();

    req.onsuccess = async () => {

        const data = req.result;

        let removed = 0;

        data.forEach(d => {

            if(!d.obs || !d.obs.synop || d.obs.synop.includes("NILL")){
                store.delete(d.time);
                removed++;
            }

        });

        alert("Удалено записей: " + removed);

        // 👇 обновляем экран
        await render();
        await drawChart();

    };

}

async function autoUpdate() {
    try {
        if (!db) await initDB();

        const rating = document.getElementById("rating");
        const saved = await verifyMissing(rating);

        await render();
        await drawChart();

        document.getElementById("lastUpdate").innerText =
            "Последнее обновление: " + new Date().toLocaleTimeString() +
            (saved > 0 ? ` (+${saved} записей)` : "");

    } catch (e) {
        console.log("Auto update error:", e);
    }

    setTimeout(autoUpdate, 1800000);
}
